<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>ChamaneTaiba - Islamic Lyrics</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;500;700&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            background: #f5f2e8;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* Main App - Full height, no overflow issues */
        .app {
            display: flex;
            flex-direction: column;
            height: 100dvh;  /* dynamic viewport height, solves mobile bottom bar issue */
            width: 100%;
            background: #ffffff;
            overflow: hidden;
        }

        /* Header fixed top */
        .header {
            background: #2c6e52;
            color: white;
            padding: 18px 20px 12px;
            text-align: center;
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
        }
        .header p {
            font-size: 0.8rem;
            opacity: 0.9;
            margin-top: 4px;
            font-family: 'Inter', sans-serif;
        }

        /* Scrollable content - takes remaining space */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 18px;
            background: #fffef7;
        }

        /* Bottom Tabs - Fixed at bottom */
        .bottom-tabs {
            display: flex;
            background: #ffffff;
            border-top: 1px solid #e2e0d4;
            padding: 8px 12px 12px;
            justify-content: space-around;
            flex-shrink: 0;
        }
        .tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #6b6b5e;
            transition: all 0.2s;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
        }
        .tab i {
            font-size: 1.5rem;
            font-style: normal;
        }
        .tab.active {
            background: #eef4f0;
            color: #2c6e52;
        }

        /* Force Urdu font on all Arabic/Urdu text elements */
        .cat-card, .list-item, .detail-title, .lyrics-text, .loading, .no-data, .small-text, .btn, .search-input {
            font-family: 'Noto Nastaliq Urdu', 'Inter', serif;
        }

        /* For UI text (non-Urdu) we keep Inter, but Urdu titles also get Noto */
        .header h1, .header p, .tab span {
            font-family: 'Inter', sans-serif;
        }

        /* Categories Grid */
        .grid-cats {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 14px;
            margin-top: 8px;
        }
        .cat-card {
            background: #f0f2ed;
            padding: 16px 10px;
            text-align: center;
            border-radius: 28px;
            font-weight: 600;
            font-size: 1.15rem;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid #dad7c7;
            color: #2c5a48;
        }
        .cat-card:active {
            background: #e0e6de;
            transform: scale(0.97);
        }

        /* Lyrics List Items */
        .list-item {
            background: #faf8f0;
            padding: 14px 18px;
            margin-bottom: 12px;
            border-radius: 60px;
            border-right: 4px solid #2c6e52;
            cursor: pointer;
            font-weight: 500;
            transition: 0.1s;
            color: #2d3e35;
            font-size: 1.05rem;
        }
        .list-item:active {
            background: #e9ece2;
        }

        /* Detail View */
        .detail-card {
            background: #fefcf5;
            border-radius: 28px;
            padding: 18px;
            border: 1px solid #e2dfcf;
        }
        .detail-title {
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            border-bottom: 2px solid #cbd5c1;
            padding-bottom: 12px;
            margin-bottom: 20px;
            color: #2c6e52;
        }
        .lyrics-text {
            font-size: 1.2rem;
            line-height: 1.9;
            white-space: pre-wrap;
            background: #fefcf5;
            padding: 12px;
            text-align: right;
            color: #2c3e2f;
        }
        .btn {
            background: #2c6e52;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 16px;
            display: inline-flex;
            gap: 8px;
            font-size: 0.9rem;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #2c6e52;
            color: #2c6e52;
        }
        .search-input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 60px;
            border: 1px solid #ddd8c6;
            background: white;
            font-size: 1rem;
            text-align: right;
            margin-bottom: 20px;
        }
        .loading, .no-data {
            text-align: center;
            padding: 40px;
            color: #8b8a7a;
        }
        .flex-btns {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .small-text {
            font-size: 0.7rem;
            opacity: 0.7;
        }

        /* Scrollbar */
        .content::-webkit-scrollbar {
            width: 4px;
        }
        .content::-webkit-scrollbar-track {
            background: #ece8dc;
        }
        .content::-webkit-scrollbar-thumb {
            background: #b9b3a0;
            border-radius: 10px;
        }

        /* Desktop styling */
        @media (min-width: 768px) {
            body {
                justify-content: center;
                align-items: center;
                background: #e8e5da;
            }
            .app {
                max-width: 550px;
                height: 95vh;
                border-radius: 32px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
                margin: 20px auto;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>🌸 چمنِ طیبہ 🌸</h1>
        <p>نعت، حمد، مناقب، سلام</p>
    </div>

    <div class="content" id="contentArea">
        <div class="loading">📖 لوڈ ہو رہا ہے...</div>
    </div>

    <div class="bottom-tabs">
        <div class="tab" data-tab="home"><i>🏠</i><span>ہوم</span></div>
        <div class="tab" data-tab="categories"><i>📂</i><span>زمرے</span></div>
        <div class="tab" data-tab="search"><i>🔍</i><span>تلاش</span></div>
        <div class="tab" data-tab="favorites"><i>⭐</i><span>پسندیدہ</span></div>
    </div>
</div>

<script>
    let allLyrics = [];
    let favorites = JSON.parse(localStorage.getItem('chamane_fav') || '[]');
    let currentTab = 'home';
    let currentDetailId = null;
    let previousTab = 'home';

    const contentDiv = document.getElementById('contentArea');
    const tabs = document.querySelectorAll('.tab');

    function saveFav() { localStorage.setItem('chamane_fav', JSON.stringify(favorites)); }
    function isFav(id) { return favorites.includes(id); }
    function toggleFav(id) {
        if (isFav(id)) favorites = favorites.filter(f => f !== id);
        else favorites.push(id);
        saveFav();
        if (currentTab === 'favorites') renderFavorites();
        if (currentTab === 'detail' && currentDetailId === id) renderDetail(id);
    }

    async function loadData() {
        try {
            const res = await fetch('lyrics.json');
            if (!res.ok) throw new Error();
            allLyrics = await res.json();
            if (!Array.isArray(allLyrics)) throw new Error();
            renderCurrent();
        } catch(e) {
            contentDiv.innerHTML = `<div class="loading">⚠️ lyrics.json نہیں ملی۔ براہ کرم فائل چیک کریں</div>`;
        }
    }

    function renderCurrent() {
        if (currentTab === 'home') renderHome();
        else if (currentTab === 'categories') renderCategories();
        else if (currentTab === 'search') renderSearch();
        else if (currentTab === 'favorites') renderFavorites();
        else if (currentTab === 'detail') renderDetail(currentDetailId);
    }

    function renderHome() {
        const cats = [...new Set(allLyrics.map(l => l.category).filter(Boolean))];
        if (!cats.length) { contentDiv.innerHTML = '<div class="loading">کوئی کیٹگری نہیں</div>'; return; }
        let html = `<div class="grid-cats">`;
        cats.forEach(c => { html += `<div class="cat-card" data-cat="${escapeHtml(c)}">📖 ${escapeHtml(c)}</div>`; });
        html += `</div>`;
        contentDiv.innerHTML = html;
        document.querySelectorAll('.cat-card').forEach(el => {
            el.addEventListener('click', () => showCategoryLyrics(el.getAttribute('data-cat')));
        });
    }

    function renderCategories() { renderHome(); }

    function showCategoryLyrics(category) {
        const filtered = allLyrics.filter(l => l.category === category);
        if (!filtered.length) {
            contentDiv.innerHTML = `<div class="loading">کوئی کلام نہیں</div><button class="btn" id="backHome">واپس</button>`;
            document.getElementById('backHome')?.addEventListener('click', () => { currentTab = 'home'; renderCurrent(); highlightTab('home'); });
            return;
        }
        let html = `<strong style="display:block; margin-bottom:12px;">📂 ${escapeHtml(category)}</strong><div>`;
        filtered.forEach(l => { html += `<div class="list-item" data-id="${l.id}">🎵 ${escapeHtml(l.title)}</div>`; });
        html += `</div><button class="btn" id="backFromCat">🔙 واپس زمرے</button>`;
        contentDiv.innerHTML = html;
        document.querySelectorAll('.list-item').forEach(el => {
            el.addEventListener('click', () => openDetail(parseInt(el.dataset.id)));
        });
        document.getElementById('backFromCat')?.addEventListener('click', () => { currentTab = 'home'; renderCurrent(); highlightTab('home'); });
    }

    function openDetail(id) {
        currentDetailId = id;
        previousTab = currentTab;
        currentTab = 'detail';
        highlightTab('', true);
        renderDetail(id);
    }

    function renderDetail(id) {
        const item = allLyrics.find(l => l.id === id);
        if (!item) { renderHome(); return; }
        const favIcon = isFav(id) ? '★' : '☆';
        const html = `
            <div class="detail-card">
                <div class="detail-title">${escapeHtml(item.title)}</div>
                <div class="lyrics-text">${escapeHtml(item.lyrics).replace(/\n/g, '<br>')}</div>
                <div class="flex-btns">
                    <button class="btn" id="favDetail">${favIcon} پسندیدہ</button>
                    <button class="btn btn-outline" id="backDetail">🔙 واپس</button>
                </div>
            </div>
        `;
        contentDiv.innerHTML = html;
        document.getElementById('favDetail')?.addEventListener('click', () => { toggleFav(id); renderDetail(id); });
        document.getElementById('backDetail')?.addEventListener('click', () => {
            currentTab = (previousTab === 'detail' || !previousTab) ? 'home' : previousTab;
            renderCurrent();
            highlightTab(currentTab);
        });
    }

    function renderSearch() {
        contentDiv.innerHTML = `<input type="text" id="searchField" class="search-input" placeholder="🔍 عنوان / متن سے تلاش کریں..."><div id="searchResults"></div>`;
        const input = document.getElementById('searchField');
        input.addEventListener('input', (e) => {
            const q = e.target.value.trim();
            if (!q) { document.getElementById('searchResults').innerHTML = ''; return; }
            const res = allLyrics.filter(l => l.title.toLowerCase().includes(q.toLowerCase()) || l.lyrics.toLowerCase().includes(q.toLowerCase()));
            let out = `<div>`;
            res.forEach(r => { out += `<div class="list-item" data-id="${r.id}">🔍 ${escapeHtml(r.title)} <span class="small-text">(${escapeHtml(r.category)})</span></div>`; });
            out += `</div>`;
            document.getElementById('searchResults').innerHTML = out;
            document.querySelectorAll('#searchResults .list-item').forEach(el => {
                el.addEventListener('click', () => openDetail(parseInt(el.dataset.id)));
            });
        });
    }

    function renderFavorites() {
        const favItems = allLyrics.filter(l => favorites.includes(l.id));
        if (!favItems.length) { contentDiv.innerHTML = `<div class="loading">⭐ کوئی پسندیدہ کلام نہیں</div>`; return; }
        let html = `<div>`;
        favItems.forEach(l => { html += `<div class="list-item" data-id="${l.id}">❤️ ${escapeHtml(l.title)}</div>`; });
        html += `</div>`;
        contentDiv.innerHTML = html;
        document.querySelectorAll('.list-item').forEach(el => {
            el.addEventListener('click', () => openDetail(parseInt(el.dataset.id)));
        });
    }

    function switchTab(tabId) {
        if (tabId === 'detail') return;
        previousTab = currentTab;
        currentTab = tabId;
        renderCurrent();
        highlightTab(tabId);
    }

    function highlightTab(tabId, isDetail = false) {
        tabs.forEach(tab => {
            const val = tab.getAttribute('data-tab');
            if (!isDetail && val === tabId) tab.classList.add('active');
            else tab.classList.remove('active');
        });
        if (!isDetail && tabId) {
            document.querySelector(`.tab[data-tab="${tabId}"]`)?.classList.add('active');
        }
    }

    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            const t = tab.getAttribute('data-tab');
            switchTab(t);
        });
    });

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    loadData();
</script>
</body>
</html>
