<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChamaneTaiba - مکمل کلام</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Noto Nastaliq Urdu', 'Jameel Noori Nastaleeq', 'Urdu Typesetting', serif;
            background: linear-gradient(145deg, #fef9e6 0%, #fff4e0 100%);
            color: #2c2b28;
            padding: 1rem;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 245, 0.95);
            border-radius: 2rem;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1f5e2d, #0c3e1f);
            padding: 1.2rem;
            text-align: center;
            color: #ffefcf;
        }
        .header a {
            color: #ffdd99;
            text-decoration: none;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,200,0.2);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            margin-bottom: 0.8rem;
        }
        .header h2 {
            font-size: 1.8rem;
        }
        .lyric-body {
            padding: 2rem 1.5rem;
        }
        .lyric-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #2b5e2f;
            border-bottom: 3px dashed #e2cfaa;
            padding-bottom: 0.8rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .lyric-text {
            font-size: 1.2rem;
            line-height: 2rem;
            white-space: pre-wrap;
            word-break: break-word;
            text-align: justify;
        }
        .error-msg {
            text-align: center;
            padding: 2rem;
            color: #b1622c;
            font-size: 1.2rem;
        }
        .back-home {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
        }
        .back-home a {
            background: #2b5e2f;
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            padding: 1rem;
            color: #ae9f83;
            border-top: 1px solid #f0e4d0;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <a href="index.html"><i class="fas fa-home"></i> چمنِ طیبہ واپس</a>
        <h2><i class="fas fa-book-open"></i> مکمل کلام</h2>
    </div>
    <div class="lyric-body" id="lyricContent">
        <div class="error-msg">لوڈ ہو رہا ہے...</div>
    </div>
    <footer>
        <i class="fas fa-heart" style="color:#be8a3a;"></i> چمنِ طیبہ — روحانی فیض
    </footer>
</div>

<script>
    async function loadLyric() {
        const urlParams = new URLSearchParams(window.location.search);
        const lyricId = parseInt(urlParams.get('id'));
        if (!lyricId || isNaN(lyricId)) {
            document.getElementById('lyricContent').innerHTML = `<div class="error-msg">❌ غلط لنک - کوئی ID موجود نہیں</div>`;
            return;
        }
        try {
            const response = await fetch('lyrics.json');
            if (!response.ok) throw new Error('JSON not found');
            const data = await response.json();
            const lyric = data.lyrics.find(l => l.id === lyricId);
            if (!lyric) {
                document.getElementById('lyricContent').innerHTML = `<div class="error-msg">❌ کلام نہیں ملا۔ ممکن ہے ID غلط ہو۔</div>`;
                return;
            }
            // find category name for extra info (optional)
            const category = data.categories.find(c => c.id === lyric.categoryId);
            const catName = category ? category.name : '';
            const formattedText = lyric.text.replace(/\n/g, '<br>');
            document.getElementById('lyricContent').innerHTML = `
                <div class="lyric-title">${lyric.title} <span style="font-size:0.9rem;">(${catName})</span></div>
                <div class="lyric-text">${formattedText}</div>
                <div class="back-home"><a href="index.html"><i class="fas fa-arrow-right"></i> مزید کلام پڑھیں</a></div>
            `;
        } catch (err) {
            document.getElementById('lyricContent').innerHTML = `<div class="error-msg">❌ ڈیٹا لوڈ کرنے میں خرابی۔ lyrics.json چیک کریں۔</div>`;
        }
    }
    loadLyric();
</script>
</body>
</html>
